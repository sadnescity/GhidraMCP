name: Build Ghidra Extension

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GHIDRA_VERSION: "12.0.4"
      GHIDRA_RELEASE_DATE: "20260303"

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Download and extract Ghidra
      run: |
        wget --no-verbose -O ghidra.zip \
          "https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_${GHIDRA_VERSION}_build/ghidra_${GHIDRA_VERSION}_PUBLIC_${GHIDRA_RELEASE_DATE}.zip"
        unzip -q ghidra.zip

    - name: Build extension
      env:
        GHIDRA_INSTALL_DIR: ${{ github.workspace }}/ghidra_${{ env.GHIDRA_VERSION }}_PUBLIC
      run: gradle

    - name: Assemble release
      run: |
        mkdir -p release
        cp dist/*.zip release/
        cp bridge_mcp_ghidra.py release/
        cp requirements.txt release/

    - name: Upload artifact
      uses: actions/upload-artifact@v5
      with:
        name: GhidraMCP-${{ env.GHIDRA_VERSION }}
        path: release/*

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        SHORT_SHA="${GITHUB_SHA::7}"
        TAG="build-${SHORT_SHA}"
        git tag "$TAG"
        git push origin "$TAG"
        gh release create "$TAG" release/* \
          --title "Build ${SHORT_SHA}" \
          --notes "Automated build from commit ${GITHUB_SHA}" \
          --latest
